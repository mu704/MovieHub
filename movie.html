<!DOCTYPE html>
<html lang="en">
<head>

    <title>MovieHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Movies</h1>

    <div id="movies-container"></div>
    <script src="js/app.js"></script>
</body>
</html>
